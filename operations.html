<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignGloss — Operations</title>
  <meta name="description" content="Live ISL to gloss translation. Allow camera access and start signing to see real-time gloss output.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>
<body data-bs-theme="dark">
  <div id="navbar-placeholder"></div>

  <section class="py-4">
    <div class="container-fluid px-4">

      <div id="metrics-bar" class="d-flex align-items-center gap-4 mb-3 p-2 bg-dark border border-secondary rounded">
        <div class="d-flex align-items-center gap-2">
          <span id="status-dot" class="status-dot status-loading"></span>
          <span id="status-label" class="small">Initializing...</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-grow-1">
          <span class="small text-secondary">Buffer:</span>
          <div class="progress flex-grow-1" style="height:16px;max-width:200px;">
            <div id="buffer-progress" class="progress-bar bg-info" role="progressbar" style="width:0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
          </div>
        </div>
        <div>
          <span class="small text-secondary">Inference:</span>
          <span id="inference-time" class="small">—</span>
        </div>
        <div>
          <span class="small text-secondary">Confidence:</span>
          <span id="confidence-display" class="small">—</span>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-8" id="video-panel">
          <div class="card bg-dark border-secondary h-100">
            <div class="card-body p-0 position-relative">
              <div class="sg-video-container" id="video-container">
                <video id="camera-feed" autoplay playsinline muted style="display:none"></video>
                <canvas id="landmark-canvas"></canvas>
                <div class="sg-fps-badge" id="fps-display" style="display:none">0 FPS</div>

                <div class="sg-loading-overlay" id="mediapipe-loading" style="display:none">
                  <div class="sg-spinner mb-3"></div>
                  <span class="text-secondary">Loading AI model...</span>
                </div>

                <div class="sg-camera-placeholder" id="camera-placeholder">
                  <i class="bi bi-camera-video"></i>
                  <p class="mb-3">Camera feed will appear here</p>
                  <button class="btn sg-btn-primary" id="start-btn">
                    <i class="bi bi-play-fill me-1"></i> Start Camera
                  </button>
                </div>

                <div class="sg-camera-error" id="camera-error" style="display:none">
                  <i class="bi bi-exclamation-triangle-fill fs-2 d-block mb-2"></i>
                  <p id="camera-error-message">Camera access denied</p>
                  <button class="btn btn-outline-danger btn-sm mt-2" id="retry-camera-btn">
                    <i class="bi bi-arrow-clockwise me-1"></i> Retry
                  </button>
                </div>
              </div>

              <div class="sg-video-controls" id="video-controls" style="display:none">
                <button class="btn btn-danger btn-sm" id="stop-btn">
                  <i class="bi bi-stop-fill me-1"></i> Stop
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-4" id="results-panel">
          <div class="card bg-dark border-secondary h-100">
            <div class="card-header bg-dark border-secondary">
              <h5 class="mb-0"><i class="bi bi-translate me-2"></i>Gloss Output</h5>
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label small text-secondary">Current Detection</label>
                <div id="current-gloss" class="p-3 bg-black rounded min-height-60">
                  <span class="text-secondary">Waiting for input...</span>
                </div>
              </div>

              <div id="error-display" class="alert alert-danger py-2 d-none" role="alert"></div>

              <div id="model-loading-spinner" class="text-center py-3">
                <div class="spinner-border spinner-border-sm text-info" role="status"></div>
                <small class="text-secondary ms-2">Loading ONNX model...</small>
              </div>

              <div id="model-error-state" class="text-center py-3 d-none">
                <i class="bi bi-exclamation-triangle text-danger fs-4 d-block mb-2"></i>
                <p class="text-danger small mb-2">Model failed to load</p>
                <button id="retry-model-btn" class="btn btn-outline-danger btn-sm">Retry</button>
              </div>

              <hr class="border-secondary">

              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label small text-secondary mb-0">History</label>
                <button id="test-mode-btn" class="btn btn-outline-warning btn-sm">Start Test Mode</button>
              </div>
              <ul id="gloss-history" class="list-group list-group-flush" style="max-height:300px;overflow-y:auto;">
              </ul>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/common.js"></script>
  <script type="module" src="js/operations-inference.js"></script>
  <script type="module" src="js/operations-capture.js"></script>
</body>
</html>
