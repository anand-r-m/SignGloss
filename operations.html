<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignGloss — Operations</title>
  <meta name="description" content="Live ISL to gloss translation. Allow camera access and start signing to see real-time gloss output.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-bs-theme="dark">
  <div id="navbar-placeholder"></div>

  <section class="sg-section" style="padding-top: 2rem">
    <div class="container-fluid px-4">

      <div id="metrics-bar" class="d-flex align-items-center gap-4 mb-3 p-2 rounded" style="background: var(--surface-card); border: 1px solid var(--border)">
        <div class="d-flex align-items-center gap-2">
          <span id="status-dot" class="status-dot status-loading"></span>
          <span id="status-label" class="small">Initializing...</span>
        </div>
        <div class="d-flex align-items-center gap-2 flex-grow-1">
          <span class="small" style="color: var(--text-muted)">Buffer:</span>
          <div class="progress flex-grow-1" style="height:14px;max-width:200px;background:var(--surface-deep);border-radius:7px">
            <div id="buffer-progress" class="progress-bar" role="progressbar" style="width:0%;background:var(--accent-primary);border-radius:7px" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
          </div>
        </div>
        <div>
          <span class="small" style="color: var(--text-muted)">Inference:</span>
          <span id="inference-time" class="small">—</span>
        </div>
        <div>
          <span class="small" style="color: var(--text-muted)">Confidence:</span>
          <span id="confidence-display" class="small">—</span>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-8" id="video-panel">
          <div class="sg-video-container" id="video-container">
            <video id="camera-feed" autoplay playsinline muted style="display:none"></video>
            <canvas id="landmark-canvas"></canvas>
            <div class="sg-fps-badge" id="fps-display" style="display:none">0 FPS</div>

            <div class="sg-loading-overlay" id="mediapipe-loading" style="display:none">
              <div class="sg-spinner mb-3"></div>
              <span style="color: var(--text-muted)">Loading AI model...</span>
            </div>

            <div class="sg-camera-placeholder" id="camera-placeholder">
              <i class="bi bi-camera-video"></i>
              <p class="mb-3">Camera feed will appear here</p>
              <button class="btn sg-btn-primary" id="start-btn">
                <i class="bi bi-play-fill me-1"></i> Start Camera
              </button>
            </div>

            <div class="sg-camera-error" id="camera-error" style="display:none">
              <i class="bi bi-exclamation-triangle-fill fs-2 d-block mb-2"></i>
              <p id="camera-error-message">Camera access denied</p>
              <button class="btn sg-btn-outline btn-sm mt-2" id="retry-camera-btn" style="border-color: var(--danger); color: var(--danger)">
                <i class="bi bi-arrow-clockwise me-1"></i> Retry
              </button>
            </div>
          </div>

          <div class="sg-video-controls" id="video-controls" style="display:none">
            <button class="btn btn-sm" id="stop-btn" style="background: var(--danger); color: #fff; border-radius: var(--radius-sm)">
              <i class="bi bi-stop-fill me-1"></i> Stop
            </button>
          </div>
        </div>

        <div class="col-lg-4" id="results-panel">
          <div class="sg-card h-100" style="padding: 0; overflow: hidden">
            <div class="px-3 py-3" style="border-bottom: 1px solid var(--border)">
              <h5 class="mb-0 sg-card-title" style="font-size: 1rem">
                <i class="bi bi-translate me-2" style="color: var(--accent-primary)"></i>Gloss Output
              </h5>
            </div>
            <div class="p-3">
              <div class="mb-3">
                <label class="form-label small" style="color: var(--text-muted)">Current Detection</label>
                <div id="current-gloss" class="p-3 rounded" style="background: var(--surface-deep); min-height: 60px; border: 1px solid var(--border); font-size: 1.1rem; font-family: var(--font-heading); color: var(--text-heading)">
                  <span style="color: var(--text-muted); font-family: var(--font-body); font-size: 0.9rem">Waiting for input...</span>
                </div>
              </div>

              <div id="error-display" class="alert alert-danger py-2 d-none" role="alert"></div>

              <div id="model-loading-spinner" class="text-center py-3">
                <div class="sg-spinner" style="width:24px;height:24px;border-width:2px;display:inline-block;vertical-align:middle"></div>
                <small style="color: var(--text-muted)" class="ms-2">Loading ONNX model...</small>
              </div>

              <div id="model-error-state" class="text-center py-3 d-none">
                <i class="bi bi-exclamation-triangle fs-4 d-block mb-2" style="color: var(--danger)"></i>
                <p class="small mb-2" style="color: var(--danger)">Model failed to load</p>
                <button id="retry-model-btn" class="btn sg-btn-outline btn-sm" style="border-color: var(--danger); color: var(--danger)">Retry</button>
              </div>

              <hr style="border-color: var(--border)">

              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label small mb-0" style="color: var(--text-muted)">History</label>
                <button id="test-mode-btn" class="btn sg-btn-outline btn-sm" style="font-size: 0.75rem; padding: 0.3rem 0.7rem; border-color: var(--warning); color: var(--warning)">Start Test Mode</button>
              </div>
              <ul id="gloss-history" class="list-group list-group-flush" style="max-height:300px;overflow-y:auto;">
              </ul>
            </div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/motion@latest/dist/motion.js"></script>
  <script src="js/common.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/animations.js"></script>
  <script type="module" src="js/operations-inference.js"></script>
  <script type="module" src="js/operations-capture.js"></script>
</body>
</html>
