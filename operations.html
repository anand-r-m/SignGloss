<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SignGloss — Operations</title>
  <meta name="description" content="Live ISL to gloss translation. Allow camera access and start signing to see real-time gloss output.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-bs-theme="dark">

  <div class="sg-world-bg"></div>

  <div id="navbar-placeholder"></div>

  <main>
    <div class="sg-ops-fullscreen" id="video-container">

      <video id="camera-feed" autoplay playsinline muted style="display:none"></video>
      <canvas id="landmark-canvas"></canvas>
      <div class="sg-ops-gradient"></div>

      <div id="camera-placeholder" style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:2">
      </div>

      <div class="sg-translate-trigger glass-panel" id="start-btn" style="z-index:5">
        <i class="bi bi-broadcast" style="font-size:64px;color:var(--text-primary);display:block;margin-bottom:16px"></i>
        <div style="font-family:var(--font-heading);font-size:clamp(1.8rem,4vw,2.5rem);font-weight:700;text-transform:uppercase;letter-spacing:4px;color:var(--text-primary)">TRANSLATE</div>
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-primary);opacity:0.6;margin-top:12px">Initialize Computational<br>Inference Engine</div>
      </div>

      <div style="position:absolute;top:112px;left:16px;z-index:5;display:flex;flex-direction:column;gap:4px">
        <div class="sg-metric-badge">
          <span class="metric-label">FPS</span>
          <span class="metric-value" id="fps-display">0.0</span>
        </div>
        <div class="sg-metric-badge">
          <span class="metric-label">LATEN.</span>
          <span class="metric-value" id="inference-time">0ms</span>
        </div>
        <div class="sg-metric-badge">
          <span class="metric-label">GLOSS</span>
          <span class="metric-value" id="gloss-count">0000</span>
        </div>
      </div>

      <div class="sg-inference-log d-none d-lg-flex">
        <div class="sg-inference-log-header">INFERENCE LOG</div>
        <div class="sg-inference-log-body glass-panel" id="gloss-history">
        </div>
        <div class="sg-live-indicator glass-panel">
          <div class="sg-live-dot" id="status-dot"></div>
          <span id="status-label">LIVE SCANNING</span>
        </div>
      </div>

      <div class="sg-gloss-output-card" id="video-panel">
        <div class="sg-certainty-bar" id="buffer-progress" style="width:0%"></div>
        <div style="position:relative;padding-top:4px">
          <div class="sg-gloss-header">
            <div class="sg-gloss-header-left">
              <i class="bi bi-gear-fill" style="font-size:14px;color:var(--text-primary)"></i>
              <span>Prediction: <span id="confidence-display">0.0%</span></span>
            </div>
            <div class="sg-gloss-header-right" id="copy-gloss-btn" aria-label="Copy gloss to clipboard">
              <i class="bi bi-clipboard" style="font-size:14px"></i>
            </div>
          </div>
          <div class="sg-gloss-main-text" id="current-gloss">—</div>
          <div class="sg-gloss-subtitle">Semantic Mapping: Awaiting Input</div>
          <div class="sg-confidence-grid">
            <div class="seg"></div>
            <div class="seg"></div>
            <div class="seg"></div>
          </div>
        </div>
      </div>

      <button class="sg-term-ops-btn" id="stop-btn" style="display:none" aria-label="Terminate operations">
        <i class="bi bi-stop-circle"></i>
        TERM OPS
      </button>

      <div id="mediapipe-loading" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,0.92);z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center">
        <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--text-primary);border-radius:50%;animation:sg-spin 0.8s linear infinite;margin-bottom:16px"></div>
        <span style="color:var(--text-secondary);font-family:var(--font-body);font-size:0.9rem">Loading AI model...</span>
      </div>

      <div id="camera-error" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;padding:2rem">
        <i class="bi bi-exclamation-triangle-fill" style="font-size:2rem;color:var(--color-danger);display:block;margin-bottom:12px"></i>
        <p id="camera-error-message" style="color:var(--color-danger);font-family:var(--font-body)">Camera access denied</p>
        <button class="btn sg-btn-outline btn-sm" id="retry-camera-btn" style="border-color:var(--color-danger);color:var(--color-danger)">
          <i class="bi bi-arrow-clockwise me-1"></i> Retry
        </button>
      </div>

      <div id="model-loading-spinner" style="display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center">
        <div style="width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--text-primary);border-radius:50%;animation:sg-spin 0.8s linear infinite;display:inline-block;vertical-align:middle"></div>
        <small style="color:var(--text-secondary);margin-left:8px">Loading ONNX model...</small>
      </div>

      <div id="model-error-state" class="d-none" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center">
        <i class="bi bi-exclamation-triangle" style="font-size:1.5rem;color:var(--color-danger);display:block;margin-bottom:8px"></i>
        <p style="font-size:0.85rem;color:var(--color-danger);margin-bottom:8px">Model failed to load</p>
        <button id="retry-model-btn" class="btn sg-btn-outline btn-sm" style="border-color:var(--color-danger);color:var(--color-danger)">Retry</button>
      </div>

      <div id="error-display" class="d-none" style="position:absolute;bottom:120px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);padding:8px 16px;border-radius:var(--radius-button);color:var(--color-danger);font-size:0.85rem;max-width:360px;text-align:center"></div>

      <div id="metrics-bar" style="display:none"></div>
      <div id="video-controls" style="display:none"></div>
      <div id="results-panel" style="display:none"></div>
      <button id="test-mode-btn" style="display:none">Test Mode</button>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/animations.js"></script>
  <script type="module" src="js/operations-inference.js"></script>
  <script type="module" src="js/operations-capture.js"></script>

  <style>
  @keyframes sg-spin {
    to { transform: rotate(360deg); }
  }
  </style>
</body>
</html>
